<!DOCTYPE html>
<html lang="en">
<head>
    <title>Captured Leads</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h2 class="mb-4">
        Captured Leads
    </h2>

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Name</th>
                <th>Company</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>

            {% for lead in leads %}

            <tr>
                <td>{{ lead.full_name }}</td>
                <td>{{ lead.company_name }}</td>
                <td>{{ lead.email }}</td>
                <td>{{ lead.phone }}</td>
                <td>{{ lead.created_at }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
