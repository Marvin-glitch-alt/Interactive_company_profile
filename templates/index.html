
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Company Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#f8f9fa,#eef3f8);
            min-height:100vh;
            display:flex;
            align-items:center;
            font-family:'Poppins',sans-serif;
        }

        .profile-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,.08);
        }

        .left-panel{
            background:#4a5d23;
            color:white;
            padding:60px 40px;
            height:100%;
        }

        .left-panel h1{
            font-weight:700;
        }

        .right-panel{
            padding:50px 40px;
            background:white;
        }

        .form-control{
            height:55px;
            border-radius:10px;
        }

        .btn{
            background:#4a5d23;
            border:none;
            height:55px;
            font-weight:600;
            border-radius:10px;
        }

        .btn:hover{
            background:#d9bb25;
        }

       .logo-placeholder-img{
            width:180px;
            height:80px;
            border-radius: 5%;
            object-fit:cover;
        }

        .benefit {
            margin-bottom:15px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        /* staggered delays */
        .benefits .benefit:nth-child(1) {
            animation-delay: 0.1s;
        }

        .benefits .benefit:nth-child(2) {
            animation-delay: 0.3s;
        }

        .benefits .benefit:nth-child(3) {
            animation-delay: 0.5s;
        }

        .benefits .benefit:nth-child(4) {
            animation-delay: 0.7s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .form-control:focus {
            border-color: #d9bb25;  
            box-shadow: 0 0 0 0.25rem rgba(217, 187, 37, 0.5);        
        }

        @media(max-width:768px){
            .left-panel{
                display:none;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card profile-card">

        <div class="row g-0">

            <div class="col-lg-5">
                <div class="left-panel">

                 <img src="{{ url_for('static', filename='GEOGREAT ltd logo. ekltd-02.jpg') }}" class="logo-placeholder-img">
                    <h1>Company Profile</h1>

                    <p class="mt-3">
                        Discover our services, expertise,
                        success stories and how we help
                        organizations improve performance.
                    </p>

                    <hr>

                    <div class="benefits">
                        <div class="benefit">✓ Industry Expertise</div>
                        <div class="benefit">✓ Proven Results</div>
                        <div class="benefit">✓ Innovative Solutions</div>
                        <div class="benefit">✓ Strategic Partnerships</div>
                    </div>

                </div>
            </div>

            <div class="col-lg-7">

                <div class="right-panel">

                    <h2 class="fw-bold mb-2">
                        Access Our Company Profile
                    </h2>

                    <p class="text-muted mb-4">
                        Please complete the form below to view
                        our company profile.
                    </p>

                    <form method="POST" action="/capture-lead">

                        <div class="mb-3">
                            <label>Full Name *</label>
                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Company Name *</label>
                            <input
                                type="text"
                                name="company_name"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Email *</label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-4">
                            <label>Phone Number</label>
                            <input
                                type="text"
                                name="phone"
                                class="form-control">
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Submit

                        </button>

                    </form>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
