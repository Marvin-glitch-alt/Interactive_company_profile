<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Company Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            align-items:center;

            font-family:'Poppins',sans-serif;

            background:
                linear-gradient(
                    rgba(0,0,0,.55),
                    rgba(0,0,0,.55)
                ),
                url("{{ url_for('static', filename='images/gscc_hero_background_branded.png') }}");

            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

        .container{
            max-width:1100px;
        }

        .profile-card{

            border-radius:30px;
            overflow:hidden;

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.15);

            box-shadow:
                0 8px 32px rgba(0,0,0,.35);

            color:white;
        }

        .left-panel{

            background:rgba(74,93,35,.55);

            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);

            color:white;

            padding:60px 40px;
            height:100%;
        }

        .left-panel h1{
            font-weight:700;
            margin-top:20px;
        }

        .right-panel{

            padding:50px 40px;

            background:rgba(255,255,255,.05);

            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);

            color:white;
        }

        .logo-placeholder-img{
            width:180px;
            border-radius:8px;
            object-fit:cover;
        }

        .form-control{

            height:55px;

            border-radius:12px;

            background:rgba(255,255,255,.12);

            border:1px solid rgba(255,255,255,.15);

            color:white;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.6);
        }

        .form-control:focus{

            background:rgba(255,255,255,.15);

            border-color:#d9bb25;

            color:white;

            box-shadow:
                0 0 0 .25rem rgba(217,187,37,.35);
        }

        label{
            color:white;
            font-weight:500;
            margin-bottom:6px;
        }

        .text-muted{
            color:rgba(255,255,255,.75)!important;
        }

        .btn-primary{

            background:#d9bb25;
            border:none;

            color:#222;

            height:55px;

            font-weight:700;

            border-radius:12px;

            transition:.3s;
        }

        .btn-primary:hover{

            background:#e5c83a;
            transform:translateY(-2px);
        }

        .btn-primary:focus,
        .btn-primary:active{

            background:#d9bb25!important;
            border:none!important;

            box-shadow:none!important;
        }

        .benefit{

            margin-bottom:15px;

            opacity:0;

            transform:translateY(20px);

            animation:fadeInUp .6s ease forwards;
        }

        .benefits .benefit:nth-child(1){
            animation-delay:.1s;
        }

        .benefits .benefit:nth-child(2){
            animation-delay:.3s;
        }

        .benefits .benefit:nth-child(3){
            animation-delay:.5s;
        }

        .benefits .benefit:nth-child(4){
            animation-delay:.7s;
        }

        @keyframes fadeInUp{

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        hr{
            border-color:rgba(255,255,255,.2);
        }

        @media(max-width:768px){

            .left-panel{
                display:none;
            }

            .right-panel{
                padding:35px 25px;
            }
        }

    </style>
</head>
<body>

<div class="container">

    <div class="card profile-card">

        <div class="row g-0">

            <div class="col-lg-5">

                <div class="left-panel">

                    <img
                        src="{{ url_for('static', filename='images/geogreat_white_logo.jpg') }}"
                        alt="GeoGreat Logo"
                        class="logo-placeholder-img">

                    <h1>Company Profile</h1>

                    <p class="mt-3">
                        Discover our services, expertise,
                        success stories and how we help
                        organizations improve performance.
                    </p>

                    <hr>

                    <div class="benefits">

                        <div class="benefit">
                            ✓ Industry Expertise
                        </div>

                        <div class="benefit">
                            ✓ Proven Results
                        </div>

                        <div class="benefit">
                            ✓ Innovative Solutions
                        </div>

                        <div class="benefit">
                            ✓ Strategic Partnerships
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-lg-7">

                <div class="right-panel">

                    <h2 class="fw-bold mb-2">
                        Access Our Company Profile
                    </h2>

                    <p class="text-muted mb-4">
                        Please complete the form below to view
                        our company profile.
                    </p>

                    <form method="POST" action="/capture-lead">

                        <div class="mb-3">

                            <label>Full Name *</label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Company Name *</label>

                            <input
                                type="text"
                                name="company_name"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Email *</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label>Phone Number</label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control">

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Submit

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
